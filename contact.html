<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Lunexa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script defer src="https://unpkg.com/phosphor-icons"></script>
    <script defer src="script.js"></script>
</head>
<body class="page">
    <header class="navbar">
        <div class="logo">Lunexa</div>
        <nav class="nav-links">
            <a href="index.html#hero">Home</a>
            <a href="index.html#mission">Mission</a>
            <a href="index.html#pricing">Pricing</a>
        </nav>
        <button class="burger" aria-label="Menu"><i class="ph-list"></i></button>
    </header>
    <div id="drawer" class="drawer">
        <button class="close" aria-label="Close"><i class="ph-x"></i></button>
        <nav class="drawer-links">
            <a href="index.html#hero">Home</a>
            <a href="index.html#mission">Mission</a>
            <a href="index.html#pricing">Pricing</a>
        </nav>
    </div>
    <main>
        <section class="scroll-reveal">
            <h1>Contact Us</h1>
            <p>Have questions about Lunexa? Drop us a line and we'll get back to you soon.</p>
            <form class="contact-form">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <textarea placeholder="Message" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>
    <footer class="footer scroll-reveal">
        <p>&copy; 2025 Lunexa. All rights reserved.</p>
    </footer>
</body>
</html>
